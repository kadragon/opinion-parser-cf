name = "opinion-parser-cf"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[triggers]
crons = ["0 */2 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "opinion-parser-db"
database_id = "50920e3e-2d3f-47b5-a118-04055e9ea8c3"

[[rules]]
type = "Text"
globs = ["**/*.html"]

[[rules]]
type = "Text"
globs = ["src/frontend/*.js"]
